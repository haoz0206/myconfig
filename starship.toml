"$schema" = 'https://starship.rs/config-schema.json'

# Configures the format of the prompt.
format = """
[ŅéČ](color_red0)\
$os\
$username\
[Ņé┤](bg:color_green fg:color_red0)\
$conda\
[Ņé┤](bg:color_orange fg:color_green)\
$directory\
[Ņé┤](fg:color_orange bg:color_yellow)\
$git_branch\
$git_status\
[Ņé┤](fg:color_yellow bg:color_green)\
[Ņé┤](fg:color_green bg:color_cyan)\
$docker_context\
[Ņé┤ ](color_cyan)\
$fill\
([ ŅéČ](mono4)\
$env_var\
$time\
$battery\
[Ņé┤](mono4))\
$line_break$character"""

# Sets the palette to "one_dark".
palette = 'one_dark'

# Sets the colors of the "one_dark" palette.
[palettes.one_dark]
mono0 = '#d7dae0' # terminal white, from the One Dark Pro VSCode theme.
mono1 = '#abb2bf' # syntax_fg.
mono2 = '#828997'
mono3 = '#5c6370'
mono4 = '#3f4451' # terminal black, from the One Dark Pro VSCode theme.
color_red0 = '#e06c75'
color_red1 = '#be5046'
color_green = '#98c379'
color_yellow = '#e5c07b'
color_blue = '#61afef'
color_purple = '#c678dd'
color_cyan = '#56b6c2'
color_orange = '#d19a66'
syntax_fg = '#abb2bf'
syntax_bg = '#282c34'
color_bg2 = '#665c54'
syntax_gutter = '#647382'
syntax_accent = '#528cff'

# Module that displays the current OS.
[os]
disabled = false # Disabled by default
style = "bg:color_red0 fg:syntax_bg"
format = '[$symbol ]($style)'

# Sets custom symbols for each OS.
[os.symbols]
