# ====================================
# Tmux 配置文件 - 适合 SSH 远程和 TUI 工具
# ====================================

# -- 基础设置 --
set -g mouse on                          # 启用鼠标支持（可以用鼠标点击切换面板、调整大小）
set -s escape-time 10                    # ESC 延迟：0 会导致 SSH 高延迟下吞掉转义序列，10ms 是安全最小值
set -g history-limit 10000               # 设置回滚缓冲区为 10000 行
set -g base-index 1                      # 窗口编号从 1 开始（而不是 0）
setw -g pane-base-index 1                # 面板编号从 1 开始
set -g renumber-windows on               # 关闭窗口后自动重新编号
set -g set-titles on                     # 设置终端标题
set -g display-time 2000                 # 提示信息显示时间（毫秒）

# -- 前缀键设置 --
unbind C-b                               # 取消默认的 Ctrl+b
set -g prefix C-s                        # 设置前缀键为 Ctrl+s
bind C-s send-prefix                     # 按两次 Ctrl+s 发送 Ctrl+s 到程序

# -- 快速重载配置 --
bind r source-file ~/.tmux.conf \; display "配置已重新加载!"

# ====================================
# 窗口和面板管理
# ====================================

# -- 新建窗口和面板 --
bind c new-window -c "#{pane_current_path}"           # Prefix + c: 在当前目录新建窗口
bind | split-window -h -c "#{pane_current_path}"      # Prefix + |: 垂直分割（左右）
bind - split-window -v -c "#{pane_current_path}"      # Prefix + -: 水平分割（上下）

# -- 面板导航（Vim 风格 + QWERTY 布局）--
bind h select-pane -L                    # Prefix + h: 选择左侧面板
bind j select-pane -D                    # Prefix + j: 选择下方面板
bind k select-pane -U                    # Prefix + k: 选择上方面板
bind l select-pane -R                    # Prefix + l: 选择右侧面板

# -- 面板大小调整 --
bind -r H resize-pane -L 5               # Prefix + H: 向左扩展 5 个单位（可重复按）
bind -r J resize-pane -D 5               # Prefix + J: 向下扩展 5 个单位
bind -r K resize-pane -U 5               # Prefix + K: 向上扩展 5 个单位
bind -r L resize-pane -R 5               # Prefix + L: 向右扩展 5 个单位

# -- 窗口导航 --
bind -r C-h previous-window              # Prefix + Ctrl+h: 上一个窗口
bind -r C-l next-window                  # Prefix + Ctrl+l: 下一个窗口

# -- 快速切换窗口 --
bind -n M-1 select-window -t 1           # Alt+1: 切换到窗口 1
bind -n M-2 select-window -t 2           # Alt+2: 切换到窗口 2
bind -n M-3 select-window -t 3           # Alt+3: 切换到窗口 3
bind -n M-4 select-window -t 4           # Alt+4: 切换到窗口 4
bind -n M-5 select-window -t 5           # Alt+5: 切换到窗口 5
bind -n M-6 select-window -t 6           # Alt+6: 切换到窗口 6
bind -n M-7 select-window -t 7           # Alt+7: 切换到窗口 7
bind -n M-8 select-window -t 8           # Alt+8: 切换到窗口 8
bind -n M-9 select-window -t 9           # Alt+9: 切换到窗口 9

# -- 面板管理 --
bind x kill-pane                         # Prefix + x: 关闭当前面板（会提示确认）
bind X kill-window                       # Prefix + X: 关闭当前窗口
bind z resize-pane -Z                    # Prefix + z: 最大化/恢复当前面板

# ====================================
# 复制模式（Vi 风格）
# ====================================

set -g mode-keys vi                      # 使用 Vi 风格的键绑定

# 进入复制模式
bind v copy-mode                         # Prefix + v: 进入复制模式

# 复制模式中的键绑定
bind -T copy-mode-vi v send-keys -X begin-selection              # v: 开始选择
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel    # y: 复制并退出
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle           # Ctrl+v: 矩形选择

# -- 剪贴板（OSC 52）--
# 通过 OSC 52 转义序列将 tmux 复制内容发送到本地终端剪贴板
# 即使在 SSH 远程会话中也能复制到本地 macOS 剪贴板（Ghostty/iTerm2 等均支持）
set -g set-clipboard on

# 粘贴
bind p paste-buffer                      # Prefix + p: 粘贴

# ====================================
# 外观主题
# ====================================

# -- 状态栏设置 --
set -g status-position bottom            # 状态栏位置
set -g status-justify left               # 窗口列表居左
set -g status-style bg=colour235,fg=colour137   # 状态栏背景和前景色

# 左侧状态栏：显示会话名称
set -g status-left '#[fg=colour197,bold] ❐ #S #[default]  '
set -g status-left-length 30

# 右侧状态栏：显示日期时间
set -g status-right '#[fg=colour233,bg=colour241,bold] %Y-%m-%d #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50

# 窗口状态样式
setw -g window-status-current-style fg=colour81,bg=colour238,bold
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '
setw -g window-status-style fg=colour138,bg=colour235,none
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

# -- 面板边框 --
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour197

# -- 消息样式 --
set -g message-style fg=colour232,bg=colour166,bold

# ====================================
# 高级功能
# ====================================

# -- 同步面板输入 --
# Prefix + g: 切换所有面板同步输入（在多个面板执行相同命令时很有用）
bind g setw synchronize-panes \; display "同步面板: #{?synchronize-panes,开启,关闭}"

# -- 会话管理 --
bind C-c new-session                     # Prefix + Ctrl+c: 新建会话
bind C-f command-prompt -p "切换到会话:" "switch-client -t '%%'"  # 切换会话

# -- 快速查看 --
bind w choose-tree -Zs                   # Prefix + w: 选择会话/窗口（树形视图）

# ====================================
# 真彩色与终端兼容（SSH 远程安全）
# ====================================

set -g default-terminal "tmux-256color"
set -as terminal-features ",*256col*:RGB"
set -as terminal-overrides ",*256col*:Tc"
# Ghostty 终端的真彩色和剪贴板支持
set -as terminal-overrides ",ghostty:Tc,ghostty:clipboard"
set -as terminal-overrides ",xterm-ghostty:Tc,xterm-ghostty:clipboard"

# 确保 tmux 内新窗口/面板继承 COLORTERM 环境变量
set -ga update-environment " COLORTERM"

# ====================================
# 其他实用设置
# ====================================

set -g visual-activity off               # 关闭活动提醒
setw -g monitor-activity off             # 关闭窗口活动监控
set -g focus-events on                   # 启用焦点事件（某些程序需要）

# -- 自动重命名 --
setw -g automatic-rename on              # 自动根据当前程序重命名窗口
set -g set-titles on                     # 设置终端标题为当前窗口名
